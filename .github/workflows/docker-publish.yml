name: Docker Publish

# Baut das FastSell-Image und pusht es zu Docker Hub.
# Läuft auf GitHub-Runnern (haben Netzzugang für npm/Playwright/Docker Hub).
#
# Voraussetzung: In den Repo-Secrets hinterlegen (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  = dein Docker-Hub-Benutzername
#   DOCKERHUB_TOKEN     = ein Docker-Hub Access Token (Account Settings -> Security)
# Das Docker-Hub-Repo "<user>/fastsell" ggf. vorher auf "Private" stellen.

on:
  workflow_dispatch: {} # manuell über den Actions-Tab startbar
  push:
    branches: [main, master]
    tags: ["v*.*.*"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/fastsell
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64 # Unraid ist x86_64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
