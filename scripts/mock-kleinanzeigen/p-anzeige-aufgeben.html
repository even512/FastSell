<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Anzeige aufgeben (Mock)</title>
  <style>
    /* Kleinanzeigen versteckt Radio-Inputs hinter gestylten Labels (sr-only) – genau das
       simulieren wir, damit der Label-Fallback von clickControl real getestet wird. */
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
    .menu { display: none; border: 1px solid #ccc; }
    .menu.open { display: block; }
    label.pill { display: inline-block; padding: 6px 12px; border: 1px solid #888; cursor: pointer; }
    input:checked + label.pill { background: #cfe9d9; }
    /* Zustand-Dialog wie auf der echten Seite: Backdrop-Overlay fängt alle Klicks dahinter ab. */
    #modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40; }
    #condition-dialog { display: none; position: fixed; z-index: 50; top: 15%; left: 50%;
      transform: translateX(-50%); background: #fff; border: 1px solid #888; padding: 16px; }
    .modal-open #modal-backdrop, .modal-open #condition-dialog { display: block; }
    #condition-dialog label { display: block; padding: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Anzeige aufgeben</h1>
  <form id="f">
    <label for="ad-title">Titel</label>
    <input id="ad-title" name="title">

    <!-- Zustand: öffnet einen MODALEN Dialog (wie auf kleinanzeigen.de). Bleibt er offen,
         blockiert das Backdrop alle weiteren Klicks – genau der reale Fehlerfall. -->
    <button type="button" id="ad-condition-trigger">Zustand: Bitte wählen</button>

    <label for="ad-description">Beschreibung</label>
    <textarea id="ad-description" name="description"></textarea>

    <label for="ad-price-amount">Preis</label>
    <input id="ad-price-amount" name="price">

    <!-- Preisart: Custom-Dropdown wie auf kleinanzeigen.de -->
    <button type="button" id="ad-price-type" aria-haspopup="menu">Bitte wählen</button>
    <div id="pt-menu" class="menu" role="menu">
      <button type="button" id="ad-price-type-menu-option-0">Festpreis</button>
      <button type="button" id="ad-price-type-menu-option-1">VB</button>
      <button type="button" id="ad-price-type-menu-option-2">Zu verschenken</button>
    </div>

    <!-- Versand: Ja/Nein-Radios, Inputs versteckt (sr-only), nur Labels sichtbar -->
    <fieldset id="ad-shipping-enabled">
      <legend>Versand möglich?</legend>
      <input class="sr-only" type="radio" id="ad-shipping-enabled-yes" name="shippingEnabled" value="yes" checked>
      <label class="pill" for="ad-shipping-enabled-yes">Ja</label>
      <input class="sr-only" type="radio" id="ad-shipping-enabled-no" name="shippingEnabled" value="no">
      <label class="pill" for="ad-shipping-enabled-no">Nein</label>
    </fieldset>

    <label for="ad-photos">Fotos</label>
    <input type="file" id="ad-photos" multiple>

    <button type="button" id="submit-btn">Anzeige aufgeben</button>
  </form>

  <!-- Zustand-Dialog + Backdrop (Markup wie KA: data-testid="modal-backdrop") -->
  <div id="modal-backdrop" data-testid="modal-backdrop" aria-hidden="true"></div>
  <div id="condition-dialog" role="dialog" aria-modal="true">
    <h2>Zustand</h2>
    <label><input type="radio" name="cond" value="Neu"> Neu</label>
    <label><input type="radio" name="cond" value="Sehr Gut"> Sehr Gut</label>
    <label><input type="radio" name="cond" value="Gut"> Gut</label>
    <label><input type="radio" name="cond" value="In Ordnung"> In Ordnung</label>
    <label><input type="radio" name="cond" value="Defekt"> Defekt</label>
    <button type="button" id="condition-cancel">Abbrechen</button>
    <button type="button" id="condition-confirm">Bestätigen</button>
  </div>

  <script>
    const state = { priceType: "", condition: "" };

    // --- Zustand-Dialog: Auswahl zählt NUR nach „Bestätigen" (wie auf der echten Seite). ---
    const openDialog = () => document.body.classList.add("modal-open");
    const closeDialog = () => document.body.classList.remove("modal-open");
    document.getElementById("ad-condition-trigger").addEventListener("click", openDialog);
    document.getElementById("condition-confirm").addEventListener("click", () => {
      const sel = document.querySelector('input[name="cond"]:checked');
      state.condition = sel ? sel.value : "";
      document.getElementById("ad-condition-trigger").textContent =
        "Zustand: " + (state.condition || "Bitte wählen");
      closeDialog();
    });
    // Abbrechen/Escape verwerfen die Auswahl – so fällt im Test auf, wenn statt „Bestätigen"
    // nur Escape gedrückt wurde.
    const discard = () => {
      const sel = document.querySelector('input[name="cond"]:checked');
      if (sel) sel.checked = false;
      closeDialog();
    };
    document.getElementById("condition-cancel").addEventListener("click", discard);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && document.body.classList.contains("modal-open")) discard();
    });

    // --- Preisart-Dropdown ---
    const trigger = document.getElementById("ad-price-type");
    const menu = document.getElementById("pt-menu");
    trigger.addEventListener("click", () => menu.classList.toggle("open"));
    const labels = ["FIXED", "NEGOTIABLE", "GIVE_AWAY"];
    for (let i = 0; i < 3; i++) {
      document.getElementById("ad-price-type-menu-option-" + i).addEventListener("click", (e) => {
        state.priceType = labels[i];
        trigger.textContent = e.target.textContent;
        menu.classList.remove("open");
      });
    }

    // --- Submit -> Bestätigungs-URL mit den tatsächlich gesetzten Werten ---
    document.getElementById("submit-btn").addEventListener("click", () => {
      const q = new URLSearchParams({
        adId: "4242",
        priceType: state.priceType || "NONE",
        shipping: document.getElementById("ad-shipping-enabled-no").checked ? "PICKUP" : "SHIPPING",
        condition: state.condition || "NONE",
      });
      location.href = "p-anzeige-aufgeben-bestaetigung.html?" + q.toString();
    });
  </script>
</body>
</html>
